    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Query</title>
        <link rel="stylesheet" href="response.css">
    </head>
    <body>
        <h2>We are here to solve your queries</h2>

        <p>Feel Free to Ask Any Question</p>
        <form id="query">
            <!-- <label for="name"></label> --> <h3>Name:</h3>
            <input type="text" id="name" name="name" required><br>
        
            <!-- <label for="email"></label> --> <h3>Email:</h3>
            <input type="email" id="email" name="email" required><br>
            
             <h3>Question:</h3><textarea id="Query" name="Query" placeholder="Ask me anything..." rows="5" style="height: 200px;width: 350px;background-color: white; border: 5px 5px black;" required></textarea><br>
            
             <input type="submit" value="Submit" onclick="showAlert()">
        </form> 
        <script>
            function showAlert() {
                alert('Sended Successfully')
                alert('Thank you ');
            }
        </script>
        
    </body>
    </html>
